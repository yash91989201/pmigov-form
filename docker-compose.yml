services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://pmigov:pmigov@db:5432/pmigov
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_ACCESS_KEY: pmigov
      S3_SECRET_KEY: pmigov-secret
      S3_BUCKET: pmigov-forms
      # Browser-reachable MinIO endpoint used to sign presigned image URLs.
      # The server talks to minio:9000 internally, but the browser can only
      # reach the published host port (9002). Point this at your public MinIO
      # domain in production.
      S3_PUBLIC_ENDPOINT: http://localhost:9002
      # Redis caches presigned URLs (optional — the app runs fine without it).
      REDIS_URL: redis://redis:6379
      # Change this before deploying anywhere real.
      ADMIN_PASSWORD: pmigov-admin
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pmigov
      POSTGRES_PASSWORD: pmigov
      POSTGRES_DB: pmigov
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmigov -d pmigov"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pmigov
      MINIO_ROOT_PASSWORD: pmigov-secret
    ports:
      # Host ports 9002/9003 to avoid clashing with other local MinIO/S3 stacks.
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
